<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试你是不是傻蛋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .question {
            margin-bottom: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
        }
        
        .question h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #34495e;
            text-align: center;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .option:hover {
            border-color: #e74c3c;
            background-color: #fadbd8;
        }
        
        .option.selected {
            border-color: #e74c3c;
            background-color: #fadbd8;
        }
        
        .button-container {
            text-align: center;
            margin-top: 40px;
        }
        
        button {
            padding: 12px 30px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        button:hover {
            background-color: #c0392b;
        }
        
        .result {
            margin-top: 40px;
            padding: 30px;
            background-color: #f8f9fa;
            border-radius: 8px;
            display: none;
            text-align: center;
        }
        
        .result h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .result-message {
            font-size: 18px;
            line-height: 1.6;
            color: #333;
        }
        
        .silly {
            color: #e74c3c;
            font-weight: bold;
            font-size: 20px;
        }
        
        .not-silly {
            color: #27ae60;
            font-weight: bold;
            font-size: 20px;
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>测试你是不是傻蛋</h1>
        
        <div class="question">
            <h2>你是不是李博文？</h2>
            <div class="options">
                <div class="option" data-value="yes">是</div>
                <div class="option" data-value="no">不是</div>
            </div>
        </div>
        
        <div class="button-container">
            <button id="submit-btn">提交答案</button>
        </div>
        
        <div class="result" id="result">
            <h2>测试结果</h2>
            <div class="result-message" id="result-message"></div>
        </div>
    </div>
    
    <script>
        // 变量初始化
        let selectedOption = null;
        
        // DOM元素
        const options = document.querySelectorAll('.option');
        const submitBtn = document.getElementById('submit-btn');
        const resultDiv = document.getElementById('result');
        const resultMessage = document.getElementById('result-message');
        
        // 选项选择功能
        options.forEach(option => {
            option.addEventListener('click', function() {
                // 移除其他选项的选中状态
                options.forEach(opt => opt.classList.remove('selected'));
                // 添加当前选项的选中状态
                this.classList.add('selected');
                // 保存答案
                selectedOption = this.getAttribute('data-value');
            });
        });
        
        // 提交按钮功能
        submitBtn.addEventListener('click', function() {
            // 检查是否选择了答案
            if (!selectedOption) {
                alert('请选择一个选项！');
                return;
            }
            
            // 根据选择的选项生成结果
            let message = '';
            
            if (selectedOption === 'yes') {
                message = '<p class="silly">你是傻蛋！</p>';
            } else {
                message = '<p class="not-silly">你不是傻蛋！</p>';
            }
            
            // 显示结果
            resultMessage.innerHTML = message;
            resultDiv.style.display = 'block';
            
            // 隐藏问题和按钮
            document.querySelector('.question').style.display = 'none';
            document.querySelector('.button-container').style.display = 'none';
        });
    </script>
</body>
</html>
